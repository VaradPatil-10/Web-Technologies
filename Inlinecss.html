<!DOCTYPE html>
<html>
<head>
    <title>Inline CSS Form</title>
</head>
<body style="font-family: Arial; background-color: #f2f2f2;">

    <h2 style="text-align:center;">Registration Form</h2>

    <form style="width:300px; margin:auto; padding:20px; background:white; border-radius:10px; box-shadow:0 0 10px gray;">
        
        <label style="font-weight:bold;">Name:</label><br>
        <input type="text" placeholder="Enter your name" 
               style="width:100%; padding:8px; margin:5px 0 15px 0; border:1px solid #ccc; border-radius:5px;"><br>

        <label style="font-weight:bold;">Email:</label><br>
        <input type="email" placeholder="Enter your email" 
               style="width:100%; padding:8px; margin:5px 0 15px 0; border:1px solid #ccc; border-radius:5px;"><br>

        <label style="font-weight:bold;">Password:</label><br>
        <input type="password" placeholder="Enter password" 
               style="width:100%; padding:8px; margin:5px 0 15px 0; border:1px solid #ccc; border-radius:5px;"><br>

        <input type="submit" value="Register"
               style="width:100%; padding:10px; background-color:#4CAF50; color:white; border:none; border-radius:5px; cursor:pointer;">

    </form>

</body>
</html>
